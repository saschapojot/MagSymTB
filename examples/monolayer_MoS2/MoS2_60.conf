 #This is the configuration file for MoS2_60 computations
#the format is key=value
#matches: key=value
# my-key = value
# my.key= value with spaces
#KEY_NAME =   value123
# complex-key.name = some value here
#does not match:
# = value              # No key
# key =                # No value, this must be filled
# key value            # No equals sign
# my key = value       # Space in key (not allowed)
# key==value          # Multiple equals (first = becomes part of key)

#name of the system
name=MoS2_60

#dimension of system
dim=2

#directions to study, available directions x,y,z
directions_to_study=x,y

#whether spin is considered
spin=True

truncation_radius=7

lattice_basis=3.193, 0.0, 0.0; 1.5965000000000005, 2.7652191142837124, 0.0; 0.0, 0.0, 20.0


space_group=None

space_group_origin=0,0,0

space_group_name_H_M=None

cell_setting=None

# --- Magnetic Space Group Metadata ---
space_group_magn_number_BNS=187.210
space_group_magn_name_UNI=P-6m2.1
space_group_magn_name_BNS=P-6m21
space_group_magn_number_OG=187.2.1440
space_group_magn_name_OG=P-6m21
point_group_number_Litvin=26.2.96
point_group_name_UNI=-6m2.1

Wyckoff_position_num=2


#Wyckoff position label Mo0, input orbitals
Mo0_orbitals=4dz2,4dxy,4dx2-y2
#one position of Mo0, coefficients  (fractional coordinates)
Mo0_position_coefs=0.0, 0.0, 0.0

#Wyckoff position label S0, input orbitals
#S0_orbitals=
